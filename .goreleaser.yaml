version: 2

project_name: devedge-cli-sdk

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: cligen
    main: ./cmd/cligen
    binary: cligen
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  - id: clikit-doctor
    main: ./cmd/clikit-doctor
    binary: clikit-doctor
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    builds:
      - cligen
      - clikit-doctor
    name_template: "devedge-cli-sdk_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: infobloxopen
    name: devedge-cli-sdk
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}}-v{{.Version}}"
