name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Verify gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Generated example is up to date
        run: |
          go run ./cmd/cligen \
            --input testdata/toy.openapi.yaml \
            --output examples/ib/gen/widgets \
            --module github.com/infobloxopen/devedge-cli-sdk \
            --domain widgets --package widgets --app ib
          git diff --exit-code examples/ib/gen
